services:
  # ────────────────────────────────────────────────────────────────────
  # PostgreSQL — database chính cho backend Spring Boot
  # ────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: aigen-lecture-postgres
    environment:
      POSTGRES_DB: aigen_lecture
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aigen_lecture"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────────────
  # video-service — Node.js + Remotion render engine
  # ────────────────────────────────────────────────────────────────────
  video-service:
    image: xdxdxdfunni/aigen-video-service:latest
    container_name: aigen-lecture-video-service
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      TTS_PROVIDER: "${TTS_PROVIDER:-mock}"
      ELEVENLABS_API_KEY: "${ELEVENLABS_API_KEY:-}"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      UPLOAD_TO_SUPABASE: "${UPLOAD_TO_SUPABASE:-false}"
      SUPABASE_URL: "${SUPABASE_URL:-}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:-}"
      SUPABASE_BUCKET_NAME: "${SUPABASE_BUCKET_NAME:-lecture-videos}"
    volumes:
      - video-output:/app/out
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ────────────────────────────────────────────────────────────────────
  # backend — Spring Boot API
  # ────────────────────────────────────────────────────────────────────
  backend:
    image: xdxdxdfunni/aigen-backend:latest
    container_name: aigen-lecture-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/aigen_lecture
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - VIDEO_SERVICE_URL=http://video-service:3001
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:80}
      # FIX: Pass the Gemini API Key from .env into the container
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  # ────────────────────────────────────────────────────────────────────
  # frontend — Vite React App (Nginx)
  # ────────────────────────────────────────────────────────────────────
  frontend:
    image: xdxdxdfunni/aigen-frontend:latest
    container_name: aigen-lecture-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  video-output: