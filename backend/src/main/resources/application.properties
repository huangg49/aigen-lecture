spring.application.name=demo

# DataSource
spring.datasource.url=jdbc:postgresql://127.0.0.1:5435/aigen_lecture
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Cho phép data.sql chạy sau khi JPA tạo schema (cần cho seed data)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Video service config (Remotion microservice)
video.service.url=${VIDEO_SERVICE_URL:http://localhost:3001}

# Job processing timeout
app.lecture.job-timeout-minutes=${APP_LECTURE_JOB_TIMEOUT_MINUTES:20}

# Async executor
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=video-async-

# JWT Configuration
jwt.secret=${JWT_SECRET:edumind-super-secret-key-for-jwt-signing-must-be-at-least-512-bits-long-2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:YOUR_API_KEY_HERE}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-3.6-flash:generateContent?key=

# File Upload Limit (BR-01)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=aigenlecture.noreply@gmail.com
spring.mail.password=pjqixcmhsmoulpxs
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.cors.allowed-origins=http://localhost:5173,http://localhost:80
